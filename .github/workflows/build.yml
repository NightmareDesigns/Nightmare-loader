name: Build & Release

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Build Python wheel + sdist
  # ─────────────────────────────────────────────────────────────────
  build-python:
    name: Build Python package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload Python dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────
  # Build standalone Windows .exe via PyInstaller
  # ─────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[windows]"

      - name: Build .exe with PyInstaller
        run: pyinstaller --clean nightmare-loader.spec

      - name: Upload Windows executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightmare-loader-windows
          path: dist/nightmare-loader.exe
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────
  # Create a GitHub Release (only on version tags)
  # ─────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-python, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Python dist
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Download Windows exe
        uses: actions/download-artifact@v4
        with:
          name: nightmare-loader-windows
          path: dist/

      - name: Create release with assets
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/nightmare-loader.exe
