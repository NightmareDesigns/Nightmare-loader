name: Build ISO

# Dedicated workflow for building and verifying the Nightmare Loader live ISO.
# Complements ci.yml (which handles Python tests, wheel, and script linting).
#
# Trigger matrix:
#   push to main       → full ISO build + SHA256 (Docker) + artifact upload
#   v* tag             → full ISO build + SHA256 + smoke-test + artifact upload
#   pull_request       → ISO script lint + overlay structure validation only
#   schedule (nightly) → full ISO build + SHA256 + smoke-test + artifact upload
#   workflow_dispatch  → full ISO build + SHA256 + optional smoke-test

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  schedule:
    # Nightly build at 02:00 UTC – catches regressions early.
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      iso_output:
        description: "Output ISO filename"
        type: string
        default: "nightmare-loader-live.iso"
      run_smoke_test:
        description: "Run QEMU boot smoke-test after build"
        type: boolean
        default: false

# Cancel in-progress runs on the same ref when a new commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── 1. Fast validation (every push / PR) ─────────────────────────────────
  lint-iso:
    name: Validate ISO build scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check bash syntax – build_iso.sh
        run: bash -n build_iso.sh

      - name: Check bash syntax – run_iso.sh
        run: bash -n run_iso.sh

      - name: Check bash syntax – iso_root scripts
        run: |
          for f in iso_root/usr/local/bin/*.sh iso_root/root/.xinitrc iso_root/root/.bash_profile; do
            [[ -f "$f" ]] || continue
            echo "→ $f"
            bash -n "$f"
          done

      - name: Verify iso_root overlay structure
        run: |
          for f in \
            iso_root/root/.bash_profile \
            iso_root/root/.xinitrc \
            iso_root/root/.config/openbox/rc.xml \
            iso_root/root/.config/openbox/menu.xml \
            iso_root/root/.config/tint2/tint2rc \
            iso_root/usr/local/bin/nightmare-live-init.sh \
            iso_root/usr/local/bin/nightmare-welcome.sh \
            iso_root/etc/hosts \
            iso_root/etc/fstab \
            iso_root/etc/network/interfaces \
            iso_root/etc/systemd/system/getty@tty1.service.d/autologin.conf \
            iso_root/etc/systemd/system/serial-getty@ttyS0.service.d/autologin.conf \
            iso_root/etc/systemd/network/01-live-dhcp.network \
            iso_root/etc/systemd/system/systemd-networkd-wait-online.service.d/timeout.conf \
            iso_root/etc/X11/xorg.conf.d/00-nightmare-live.conf; do
            [[ -f "$f" ]] || { echo "Missing overlay file: $f"; exit 1; }
            echo "  ✓  $f"
          done

      - name: Verify GRUB Nightmare theme is present and complete
        run: |
          THEME=nightmare_loader/theme/theme.txt
          [[ -f "$THEME" ]] || { echo "GRUB theme missing: $THEME"; exit 1; }
          grep -q 'NIGHTMARE LOADER' "$THEME" \
            || { echo "GRUB theme missing 'NIGHTMARE LOADER' title"; exit 1; }
          grep -q '#cc0000' "$THEME" \
            || { echo "GRUB theme missing blood-red accent colour #cc0000"; exit 1; }
          grep -q '#00cc00' "$THEME" \
            || { echo "GRUB theme missing matrix-green colour #00cc00"; exit 1; }
          echo "  ✓  GRUB Nightmare theme OK"

  # ── 2. Full ISO build (main, tags, nightly, manual) ───────────────────────
  build-iso:
    name: Build live ISO
    runs-on: ubuntu-latest
    needs: lint-iso
    # Skip full build on PR (lint-only for fast feedback); run everywhere else.
    if: |
      github.event_name != 'pull_request'
    outputs:
      iso_name: ${{ steps.set-name.outputs.iso_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve ISO output name
        id: set-name
        run: |
          ISO_NAME="${{ github.event.inputs.iso_output || 'nightmare-loader-live.iso' }}"
          echo "iso_name=${ISO_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build the ISO builder Docker image
        run: docker build -t nightmare-iso-builder -f Dockerfile.iso-builder .

      - name: Build the Nightmare Loader live ISO
        run: |
          ISO_NAME="${{ steps.set-name.outputs.iso_name }}"
          docker run --rm --privileged \
            -v "$(pwd)":/out \
            nightmare-iso-builder \
            ./build_iso.sh --output "/out/${ISO_NAME}"

      - name: Show ISO details
        run: |
          ISO_NAME="${{ steps.set-name.outputs.iso_name }}"
          ls -lh "${ISO_NAME}"
          if command -v isoinfo &>/dev/null; then
            isoinfo -d -i "${ISO_NAME}" | head -20
          fi

      - name: Verify ISO structure (mount check)
        run: |
          ISO_NAME="${{ steps.set-name.outputs.iso_name }}"
          MOUNT_DIR="$(mktemp -d)"
          sudo mount -o loop,ro "${ISO_NAME}" "${MOUNT_DIR}"
          echo "=== ISO top-level contents ==="
          ls -la "${MOUNT_DIR}"
          echo "=== live/ ==="
          ls -la "${MOUNT_DIR}/live/" || true
          echo "=== boot/grub/ ==="
          ls -la "${MOUNT_DIR}/boot/grub/" || true

          for f in live/vmlinuz live/initrd.img live/filesystem.squashfs \
                   boot/grub/grub.cfg boot/grub/themes/nightmare/theme.txt; do
            if [[ -f "${MOUNT_DIR}/${f}" ]]; then
              SIZE="$(du -sh "${MOUNT_DIR}/${f}" | cut -f1)"
              echo "  ✓  ${f}  (${SIZE})"
            else
              echo "  ✗  ${f}  MISSING"
              sudo umount "${MOUNT_DIR}"
              exit 1
            fi
          done
          sudo umount "${MOUNT_DIR}"

      - name: Generate SHA256 checksum
        run: |
          ISO_NAME="${{ steps.set-name.outputs.iso_name }}"
          sha256sum "${ISO_NAME}" > "${ISO_NAME}.sha256"
          echo "=== SHA256 checksum ==="
          cat "${ISO_NAME}.sha256"

      - name: Upload ISO + checksum artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightmare-loader-live-iso
          path: |
            ${{ steps.set-name.outputs.iso_name }}
            ${{ steps.set-name.outputs.iso_name }}.sha256
          retention-days: 30

  # ── 3. QEMU boot smoke-test (tags, nightly, or manual request) ────────────
  smoke-test:
    name: QEMU boot smoke-test
    runs-on: ubuntu-latest
    needs: build-iso
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_smoke_test == true)
    steps:
      - uses: actions/checkout@v4

      - name: Download built ISO
        uses: actions/download-artifact@v4
        with:
          name: nightmare-loader-live-iso

      - name: Install QEMU
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends qemu-system-x86

      - name: Make run_iso.sh executable
        run: chmod +x run_iso.sh

      - name: Boot smoke-test (headless, 180 s timeout)
        run: |
          ISO_NAME="${{ needs.build-iso.outputs.iso_name }}"
          ./run_iso.sh \
            --iso "${ISO_NAME}" \
            --headless \
            --wait-boot \
            --serial-log /tmp/nightmare-boot.log \
            --no-kvm \
            --ram 768

      - name: Upload boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-serial-log
          path: /tmp/nightmare-boot.log
          retention-days: 7
