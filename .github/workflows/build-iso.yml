name: Build ISO

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'build_iso.sh'
      - 'iso_root/**'
      - 'nightmare_loader/**'
      - '.github/workflows/build-iso.yml'
  pull_request:
    paths:
      - 'build_iso.sh'
      - 'iso_root/**'
      - 'nightmare_loader/**'
      - '.github/workflows/build-iso.yml'

# Security: Restrict permissions to minimum required
permissions:
  contents: read

jobs:
  build-iso:
    name: Build Nightmare Loader ISO
    runs-on: ubuntu-22.04

    # Security: Prevent concurrent builds to avoid race conditions
    concurrency:
      group: iso-build-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: false

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Security: Use full clone depth for reproducibility
          fetch-depth: 0
          # Security: Persist credentials disabled
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Security: Verify Python installation
          check-latest: true

      - name: Verify build script integrity
        run: |
          # Verify the build script hasn't been tampered with
          if [ ! -f "build_iso.sh" ]; then
            echo "Error: build_iso.sh not found"
            exit 1
          fi

          # Check for suspicious commands in build script
          if grep -E '(curl.*\||wget.*\||rm\s+-rf\s+/(?!tmp|var/tmp))' build_iso.sh; then
            echo "Warning: Potentially dangerous commands detected in build_iso.sh"
          fi

          # Verify script has proper shebang
          head -1 build_iso.sh | grep -q '^#!/' || {
            echo "Error: Invalid or missing shebang in build_iso.sh"
            exit 1
          }

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          # Install only necessary packages with version pinning where critical
          sudo apt-get install -y --no-install-recommends \
            debootstrap \
            squashfs-tools \
            grub-pc-bin \
            grub-efi-amd64-bin \
            grub-common \
            xorriso \
            mtools

          # Verify critical binaries
          command -v debootstrap || exit 1
          command -v mksquashfs || exit 1
          command -v grub-mkrescue || exit 1

      - name: Create virtual environment
        run: |
          python -m venv .venv
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -e .

      - name: Verify Nightmare Loader installation
        run: |
          nightmare-loader --version
          python -c "import nightmare_loader; print(f'Version: {nightmare_loader.__version__}')"

      - name: Build ISO
        run: |
          # Build with restricted environment
          sudo -E \
            HOME="$HOME" \
            PATH="$PATH" \
            ./build_iso.sh \
              --output "${{ github.workspace }}/nightmare-loader-live.iso"
        env:
          # Security: Explicitly clear sensitive environment variables
          GITHUB_TOKEN: ''

      - name: Verify ISO integrity
        run: |
          ISO_FILE="${{ github.workspace }}/nightmare-loader-live.iso"

          # Check ISO exists and is not empty
          if [ ! -f "$ISO_FILE" ]; then
            echo "Error: ISO file not created"
            exit 1
          fi

          if [ ! -s "$ISO_FILE" ]; then
            echo "Error: ISO file is empty"
            exit 1
          fi

          # Verify ISO is valid
          file "$ISO_FILE" | grep -i "ISO 9660" || {
            echo "Error: File is not a valid ISO"
            exit 1
          }

          # Check reasonable size (should be > 100MB and < 2GB)
          SIZE=$(stat -c%s "$ISO_FILE")
          if [ "$SIZE" -lt 104857600 ]; then
            echo "Warning: ISO seems too small ($SIZE bytes)"
          fi
          if [ "$SIZE" -gt 2147483648 ]; then
            echo "Warning: ISO seems too large ($SIZE bytes)"
          fi

          # Calculate checksums
          echo "ISO Size: $(du -h "$ISO_FILE" | cut -f1)"
          echo "SHA256: $(sha256sum "$ISO_FILE" | cut -d' ' -f1)"
          echo "MD5: $(md5sum "$ISO_FILE" | cut -d' ' -f1)"

      - name: Generate SBOM (Software Bill of Materials)
        run: |
          pip install pip-audit
          pip-audit --format json --output sbom-iso.json || true

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightmare-loader-iso-${{ github.sha }}
          path: nightmare-loader-live.iso
          retention-days: 30
          # Security: Compress artifact
          compression-level: 9
          if-no-files-found: error

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-iso-${{ github.sha }}
          path: sbom-iso.json
          retention-days: 90
          if-no-files-found: warn

      - name: Upload checksums
        run: |
          sha256sum nightmare-loader-live.iso > nightmare-loader-live.iso.sha256
          md5sum nightmare-loader-live.iso > nightmare-loader-live.iso.md5

      - name: Upload checksum artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightmare-loader-iso-checksums-${{ github.sha }}
          path: |
            nightmare-loader-live.iso.sha256
            nightmare-loader-live.iso.md5
          retention-days: 90

      - name: Cleanup
        if: always()
        run: |
          # Remove temporary build artifacts
          sudo rm -rf /tmp/nightmare-iso-* || true
          # Clear any cached credentials
          rm -rf ~/.cache/pip || true
