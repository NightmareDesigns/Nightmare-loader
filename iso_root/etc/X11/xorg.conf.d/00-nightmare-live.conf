# /etc/X11/xorg.conf.d/00-nightmare-live.conf
# Safe fallback graphics configuration for the Nightmare Loader live desktop.
# Specifies the VESA driver so X11 always starts on bare-metal and in all
# QEMU display modes (std VGA, QXL, virtio-gpu) without needing a GPU-specific
# driver.  Remove or rename this file on hardware that has better driver support.

Section "ServerFlags"
    Option  "AutoAddDevices"    "On"
    Option  "AllowEmptyInput"   "On"
EndSection

Section "Device"
    Identifier  "NightmareLiveGPU"
    Driver      "vesa"
EndSection

Section "Screen"
    Identifier  "NightmareLiveScreen"
    Device      "NightmareLiveGPU"
    DefaultDepth 24
    SubSection "Display"
        Depth   24
        Modes   "1024x768" "800x600" "640x480"
    EndSubSection
EndSection
