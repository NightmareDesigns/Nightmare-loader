# /etc/systemd/system/getty@tty1.service.d/autologin.conf
# Drop-in override for the systemd getty service on tty1.
# Configures automatic root login for the Nightmare Loader live environment
# so the user reaches the welcome screen without entering a password.
# The live filesystem is ephemeral and has no root password set.

[Service]
ExecStart=
ExecStart=-/sbin/agetty --autologin root --noclear %I $TERM
